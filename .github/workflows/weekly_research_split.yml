name: Talent Management Weekly Report (Auto)

on:
  schedule:
    # 毎週月曜 08:00 JST = 日曜 23:00 UTC
    - cron: '0 23 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'dry-run（レポート生成のみ、メール・Teams送信スキップ）'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Phase 1: Python RSS収集（トークン消費ゼロ） ─────────────
      - name: Phase 1 - RSS news collection (Python)
        run: |
          python src/collect_news.py --days 7 --output data/raw_news.json

      - name: Check article count
        id: check
        run: |
          COUNT=$(python -c "import json; print(json.load(open('data/raw_news.json'))['total_count'])")
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "収集記事数: $COUNT 件"
          if [ "$COUNT" -eq 0 ]; then
            echo "記事が0件のため後続ステップをスキップします"
          fi

      # ── Phase 2+3: Claude Code でレポート生成 ────────────────────
      - name: Phase 2+3 - Generate report (Claude)
        if: steps.check.outputs.count != '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude \
            --print \
            --allowedTools "Read,Write,Bash,Glob" \
            --max-turns 20 \
            "$(cat prompts/talent_mgmt_phase2.md)"

      # ── レポートをコミット・プッシュ ─────────────────────────────
      - name: Commit and push report
        if: steps.check.outputs.count != '0'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add reports/talent_mgmt_weekly_*.txt
          git pull --rebase --autostash origin main
          git diff --staged --quiet || git commit -m "Add talent management weekly report $(date +'%Y%m%d') [auto]"
          git push -u origin main
