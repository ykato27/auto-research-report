name: Send AI News Email

on:
  push:
    branches:
      - main
    paths:
      - 'reports/ai_news_*.txt'

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: |
          TODAY=$(date +%Y%m%d)
          FILE="reports/ai_news_${TODAY}.txt"

          if [ ! -f "$FILE" ]; then
            FILE=$(git diff --name-only HEAD^ HEAD 2>/dev/null | grep 'reports/ai_news_' | head -1)
          fi

          if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then
            echo "❌ AI Newsファイルが見つかりません"
            exit 1
          fi

          echo "✓ 送信対象ファイル: $FILE"
          python send_daily_ai_news.py $FILE
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL_AI_NEWS: ${{ secrets.RECIPIENT_EMAIL_AI_NEWS }}
