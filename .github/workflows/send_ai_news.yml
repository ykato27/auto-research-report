name: Send AI News & Talent Management Email

on:
  push:
    branches:
      - main
    paths:
      - 'reports/ai_news_*.txt'
      - 'reports/talent_mgmt_weekly_*.txt'

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: |
          # 1. 当日の日付でファイルを特定（AI News）
          TODAY=$(date +%Y%m%d)
          FILE="reports/ai_news_${TODAY}.txt"

          # 2. AI Newsファイルがない場合は、タレマネファイルを探す
          if [ ! -f "$FILE" ]; then
            FILE="reports/talent_mgmt_weekly_${TODAY}.txt"
          fi

          # 3. どちらもない場合はプッシュ差分から探す（AI News優先）
          if [ ! -f "$FILE" ]; then
            FILE=$(git diff --name-only HEAD^ HEAD 2>/dev/null | grep -E 'reports/(ai_news_|talent_mgmt_weekly_)' | head -1)
          fi

          if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then
            echo "❌ 対象ファイルが見つかりません"
            exit 1
          fi

          echo "✓ 送信対象ファイル: $FILE"
          python send_daily_ai_news.py $FILE
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
