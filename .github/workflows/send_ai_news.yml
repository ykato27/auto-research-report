name: Send AI News Email

on:
  push:
    branches:
      - main
    paths:
      - 'reports/ai_news_*.txt'

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: |
          # 1. 当日の日付でファイルを特定（最優先）
          TODAY=$(date +%Y%m%d)
          FILE="reports/ai_news_${TODAY}.txt"

          # 2. 当日ファイルがない場合はプッシュ差分から探す
          if [ ! -f "$FILE" ]; then
            FILE=$(git diff --name-only HEAD^ HEAD 2>/dev/null | grep 'reports/ai_news_' | head -1)
          fi

          if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then
            echo "対象ファイルが見つかりません"
            exit 1
          fi

          echo "送信対象ファイル: $FILE"
          python send_daily_ai_news.py $FILE
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
