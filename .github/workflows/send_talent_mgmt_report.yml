name: Send Talent Management Weekly Report Email and Teams

on:
  push:
    branches:
      - main
    paths:
      - 'reports/talent_mgmt_weekly_*.txt'

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Detect report file
        id: detect
        run: |
          TODAY=$(date +%Y%m%d)
          FILE="reports/talent_mgmt_weekly_${TODAY}.txt"

          if [ ! -f "$FILE" ]; then
            FILE=$(git diff --name-only HEAD^ HEAD 2>/dev/null | grep 'reports/talent_mgmt_weekly_' | head -1)
          fi

          if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then
            echo "❌ タレントマネジメントレポートが見つかりません"
            exit 1
          fi

          echo "✓ 送信対象ファイル: $FILE"
          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Send Email
        run: python send_daily_ai_news.py ${{ steps.detect.outputs.file }}
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL_TALENT_MGMT: ${{ secrets.RECIPIENT_EMAIL_TALENT_MGMT }}

      - name: Send to Teams
        run: python send_report_to_teams.py ${{ steps.detect.outputs.file }}
        env:
          TEAMS_WORKFLOW_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
