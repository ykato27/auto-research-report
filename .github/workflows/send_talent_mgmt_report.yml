name: Send Talent Management Weekly Report Email

on:
  push:
    branches:
      - main
    paths:
      - 'reports/talent_mgmt_weekly_*.txt'

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: |
          TODAY=$(date +%Y%m%d)
          FILE="reports/talent_mgmt_weekly_${TODAY}.txt"

          if [ ! -f "$FILE" ]; then
            FILE=$(git diff --name-only HEAD^ HEAD 2>/dev/null | grep 'reports/talent_mgmt_weekly_' | head -1)
          fi

          if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then
            echo "❌ タレントマネジメントレポートが見つかりません"
            exit 1
          fi

          echo "✓ 送信対象ファイル: $FILE"
          python send_talent_mgmt_email.py $FILE
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL_TALENT_MGMT: ${{ secrets.RECIPIENT_EMAIL_TALENT_MGMT }}
